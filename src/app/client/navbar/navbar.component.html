<!-- navbar.component.html -->
<nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 bg-white/80 backdrop-blur-md shadow-sm"
     [class.scrolled]="isScrolled"
     [class.py-4]="!isScrolled"
     [class.py-2]="isScrolled">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between">
      
      <!-- Logo avec animation -->
      <div class="flex items-center space-x-2 group">
       <img src="images/logo-Photoroom.png" class="w-[100px]"/>
      </div>

      <!-- Menu Desktop avec animations -->
      <div class="hidden md:flex items-center space-x-8">
        <a routerLink="/kinprestige/home" 
           class="relative text-gray-700 hover:text-blue-600 transition-colors duration-200 group">
          Accueil
          <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-blue-600 transition-all duration-300 group-hover:w-full"></span>
        </a>
        <a routerLink="/kinprestige/services"
           class="relative text-gray-700 hover:text-blue-600 transition-colors duration-200 group">
          Services
          <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-blue-600 transition-all duration-300 group-hover:w-full"></span>
        </a>
        <a href="#" 
           class="relative text-gray-700 hover:text-blue-600 transition-colors duration-200 group">
          À propos
          <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-blue-600 transition-all duration-300 group-hover:w-full"></span>
        </a>
        <a routerLink="/kinprestige/contact" 
           class="relative text-gray-700 hover:text-blue-600 transition-colors duration-200 group">
          Contact
          <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-blue-600 transition-all duration-300 group-hover:w-full"></span>
        </a>
      </div>

      <!-- Boutons Desktop avec animations -->
      <div class="hidden md:flex items-center space-x-4">
        <button class="px-4 py-2 bg-green-500 rounded-full text-white  hover:text-blue-600 transition-all duration-200 relative overflow-hidden group">
          <span class="relative z-10">Demander un devis</span>
          <span class="absolute inset-0 bg-gray-100 transform scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-left"></span>
        </button>
      </div>

      <!-- Bouton Menu Mobile avec animation -->
      <button (click)="toggleMenu()" 
              class="md:hidden relative w-10 h-10 focus:outline-none">
        <span class="sr-only">Ouvrir le menu</span>
        <div class="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2">
          <span [class]="getMenuIconClass('top')"></span>
          <span [class]="getMenuIconClass('middle')"></span>
          <span [class]="getMenuIconClass('bottom')"></span>
        </div>
      </button>
    </div>

    <!-- Menu Mobile avec animation -->
    <div [class]="getMobileMenuClass()">
      <div class="px-4 py-6 space-y-4">
        <a routerLink="/kinprestige/home" 
           class="block text-gray-700 hover:text-blue-600 transition-colors duration-200 transform hover:translate-x-2"
           (click)="closeMenu()">Accueil</a>
        <a routerLink="/kinprestige/services" 
           class="block text-gray-700 hover:text-blue-600 transition-colors duration-200 transform hover:translate-x-2"
           (click)="closeMenu()">Services</a>
        <a href="#" 
           class="block text-gray-700 hover:text-blue-600 transition-colors duration-200 transform hover:translate-x-2"
           (click)="closeMenu()">À propos</a>
        <a routerLink="/kinprestige/contact"
           class="block text-gray-700 hover:text-blue-600 transition-colors duration-200 transform hover:translate-x-2"
           (click)="closeMenu()">Contact</a>
        
        <div class="pt-4 space-y-3">
          <button class="w-full px-4 py-2 text-white border bg-green-500 shadow-lg rounded-full hover:bg-gray-50 transition-all duration-200">
            Demander un dévis
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Espace pour compenser la navbar fixed -->
<div class="h-20"></div>
